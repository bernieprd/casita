name = "casita-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "AUTH_KV"
id = "2d412d6c4d5e4f6fbc17b2aae06de761"
preview_id = "8f83fdfdf2254528b98ec78c65e1b88f"

[vars]
# Add non-secret environment variables here.
# Secrets (e.g. NOTION_TOKEN) must be set via:
#   wrangler secret put NOTION_TOKEN
APP_BASE_URL = "https://dashboard.mycasita.app"
WORKER_BASE_URL = "https://casita-worker.bernardoprd.workers.dev"
GOOGLE_REDIRECT_URI = "https://casita-worker.bernardoprd.workers.dev/auth/google/callback"
RESEND_FROM_EMAIL = "Casita <hello@mycasita.app>"

[[d1_databases]]
binding = "DB"
database_name = "casita"
database_id = "19d078e5-4a7c-4dad-9a9c-45ccf66e2bd8"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "RECIPE_PHOTOS"
bucket_name = "casita-recipe-photos"

# Rate limiting — general (100 req / 60 s per user/IP)
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Rate limiting — admin endpoints (5 req / 60 s per IP)
[[unsafe.bindings]]
name = "ADMIN_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }
